{% extends 'admin/admin_base.html' %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <div>
        <h1 style="margin: 0; color: #0f172a;">Global Announcements</h1>
        <p style="color: #64748b; margin-top: 0.5rem;">Broadcast notices to all teachers and students.</p>
    </div>
</div>

<!-- Admin currently only views announcements. Posting requires a Teacher profile. -->

<div class="card">
    <h2 style="margin-top: 0;">Recent Announcements</h2>
    <div id="announcement-list" style="display: flex; flex-direction: column; gap: 1rem;">
        <p style="text-align: center; color: #94a3b8;">Loading announcements...</p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function loadAnnouncements() {
        fetch('/api/announcements/')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('announcement-list');
                list.innerHTML = '';
                if(data.length === 0) {
                    list.innerHTML = '<p style="text-align: center; color: #64748b;">No announcements found.</p>';
                    return;
                }
                data.forEach(ann => {
                    const date = new Date(ann.date_posted).toLocaleDateString();
                    list.innerHTML += `
                        <div style="padding: 1.5rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                                <h3 style="margin: 0;">${ann.title}</h3>
                                <span style="background: #e2e8f0; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.8rem;">${ann.category}</span>
                            </div>
                            <p style="margin: 0 0 1rem 0; color: #475569;">${ann.content}</p>
                            <small style="color: #94a3b8;">Posted on: ${date} by ${ann.teacher_name || 'Admin'}</small>
                        </div>
                    `;
                });
            })
            .catch(err => console.error(err));
    }

    document.addEventListener('DOMContentLoaded', loadAnnouncements);
</script>
{% endblock %}
