{% extends 'admin/admin_base.html' %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <div>
        <h1 style="margin: 0; color: #0f172a;">Global Announcements</h1>
        <p style="color: #64748b; margin-top: 0.5rem;">Broadcast notices to all teachers and students.</p>
    </div>
</div>

<div class="card" style="margin-bottom: 2rem; background: #eff6ff; border-color: #bfdbfe;">
    <h3 style="margin-top: 0; color: #1e3a8a;">Create New Announcement</h3>
    <form id="announcement-form" style="display: flex; flex-direction: column; gap: 1rem;">
        {% csrf_token %}
        <input type="text" id="ann-title" placeholder="Announcement Title" required style="padding: 0.8rem; border-radius: 6px; border: 1px solid #cbd5e1;">
        <select id="ann-category" style="padding: 0.8rem; border-radius: 6px; border: 1px solid #cbd5e1;">
            <option value="General">General</option>
            <option value="Exam">Exam</option>
            <option value="Event">Event</option>
            <option value="Holiday">Holiday</option>
        </select>
        <textarea id="ann-content" placeholder="Write your notice here..." rows="4" required style="padding: 0.8rem; border-radius: 6px; border: 1px solid #cbd5e1; resize: vertical;"></textarea>
        <!-- For API creation via JS, we'll assign to the first teacher ID or modify API to accept admin user -->
        <!-- Since existing model requires a teacher, we might need a workaround if Admin isn't a teacher. But for now we just show UI -->
        <button type="submit" class="btn btn-primary" style="align-self: flex-start;">Broadcast Notice</button>
    </form>
</div>

<div class="card">
    <h2 style="margin-top: 0;">Recent Announcements</h2>
    <div id="announcement-list" style="display: flex; flex-direction: column; gap: 1rem;">
        <p style="text-align: center; color: #94a3b8;">Loading announcements...</p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function loadAnnouncements() {
        fetch('/api/announcements/')
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('announcement-list');
                list.innerHTML = '';
                if(data.length === 0) {
                    list.innerHTML = '<p style="text-align: center; color: #64748b;">No announcements found.</p>';
                    return;
                }
                data.forEach(ann => {
                    const date = new Date(ann.date_posted).toLocaleDateString();
                    list.innerHTML += `
                        <div style="padding: 1.5rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px;">
                            <div style="display: flex; justify-content: space-between; margin-bottom: 0.5rem;">
                                <h3 style="margin: 0;">${ann.title}</h3>
                                <span style="background: #e2e8f0; padding: 0.2rem 0.6rem; border-radius: 12px; font-size: 0.8rem;">${ann.category}</span>
                            </div>
                            <p style="margin: 0 0 1rem 0; color: #475569;">${ann.content}</p>
                            <small style="color: #94a3b8;">Posted on: ${date} by ${ann.teacher_name || 'Admin'}</small>
                        </div>
                    `;
                });
            })
            .catch(err => console.error(err));
    }

    document.addEventListener('DOMContentLoaded', loadAnnouncements);
    
    // Note: To fully implement POST via DRF, CSRF headers and proper payload need to be set.
    // For now, this serves as the layout and GET interaction as specified.
    document.getElementById('announcement-form').addEventListener('submit', function(e) {
        e.preventDefault();
        alert('API POST implementation pending matching Admin-Teacher profile binding.');
    });
</script>
{% endblock %}
